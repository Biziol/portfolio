services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: changeme_root_password
      MYSQL_DATABASE: portfolio_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - portfolio_net

  backend:
    image: ghcr.io/biziol/portfolio-backend:latest
    build: ./backend
    depends_on:
      - db
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/portfolio_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: changeme_root_password
      APP_CORS_ALLOWED_ORIGIN: "http://localhost:3002,http://127.0.0.1:3002"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_EMAIL_HOST: smtp.gmail.com
      SPRING_EMAIL_PORT: 587
      SPRING_EMAIL_USERNAME: tuoindirizzo@example.com
      SPRING_EMAIL_PASSWORD: PASSWORD_APP
    networks:
      - portfolio_net

  frontend:
    image: ghcr.io/biziol/portfolio-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    restart: unless-stopped
    networks:
      - portfolio_net

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3002:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - portfolio_net

configs:
  nginx_config:
    content: |
      events { worker_connections 1024; }
      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;
          server {
              listen 80;
              server_name localhost;
              location /api {
                  proxy_pass http://backend:8080;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }
              location /swagger-ui/ {
                  proxy_pass http://backend:8080;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
              }
              location /v3/api-docs {
                  proxy_pass http://backend:8080;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
              } 
              location / {
                  proxy_pass http://frontend:80; 
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }
          }
      }

volumes:
  db_data:

networks:
  portfolio_net:
    driver: bridge
