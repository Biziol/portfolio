<svg 
  xmlns="http://www.w3.org/2000/svg" 
  width="48" 
  height="48" 
  viewBox="0 0 24 24" 
  fill="none" 
  stroke="currentColor" 
  stroke-width="2" 
  stroke-linecap="round" 
  stroke-linejoin="round" 
  class="lucide lucide-mouse"
>
  <!-- Stili CSS incorporati per l'animazione -->
  <style>
    .scroll-wheel {
      animation: scrollAnim 1.6s cubic-bezier(0.42, 0, 0.58, 1) infinite;
    }

    @keyframes scrollAnim {
      0% {
        transform: translateY(0);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      60% {
        transform: translateY(4px);
        opacity: 1;
      }
      80%, 100% {
        transform: translateY(4px);
        opacity: 0;
      }
    }
  </style>

  <!-- Corpo del mouse -->
  <rect x="5" y="2" width="14" height="20" rx="7"/>
  
  <!-- Gruppo animato per la rotellina -->
  <g class="scroll-wheel">
    <path d="M12 6v4"/>
  </g>
</svg>